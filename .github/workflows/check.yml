name: Check

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint, format, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle (caches deps + wrapper)
        uses: gradle/actions/setup-gradle@v4

      # Stub local.properties: CI doesn't have a populated one, and the build no longer
      # bakes keys into BuildConfig, but Gradle still wants `sdk.dir` (or ANDROID_HOME).
      # actions/setup-android handles ANDROID_HOME automatically, so this is purely a safety net.
      - name: Stub local.properties
        run: |
          if [ ! -f local.properties ]; then
            echo "# Generated by CI — empty on purpose" > local.properties
          fi

      - name: Spotless (ktlint) — formatting
        run: ./gradlew spotlessCheck --no-daemon --stacktrace

      - name: Detekt — static analysis
        run: ./gradlew detekt --no-daemon --stacktrace

      - name: Android Lint
        run: ./gradlew lintDebug --no-daemon --stacktrace

      - name: Unit tests
        run: ./gradlew testDebugUnitTest --no-daemon --stacktrace

      - name: Assemble debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload Detekt report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detekt-report
          path: app/build/reports/detekt/
          if-no-files-found: ignore

      - name: Upload Android Lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html
          if-no-files-found: ignore

      - name: Upload unit test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: app/build/reports/tests/testDebugUnitTest/
          if-no-files-found: ignore

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
